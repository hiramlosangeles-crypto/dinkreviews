<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courts — DINKREVIEWS</title>
<meta name="description" content="Find and review pickleball courts near you. Community ratings for West Hollywood, Beverly Hills and greater LA.">
<meta name="theme-color" content="#1A3A2A">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root{--forest:#1A3A2A;--forest-mid:#224835;--forest-light:#2D5C42;--amber:#F5A623;--amber-soft:#FEF3DC;--sage:#7BAE8C;--sage-soft:#EBF4EE;--cream:#FAF8F4;--warm-white:#FFFFFF;--ink:#111A14;--slate:#5C7A66;--mist:#A8C0B0;--rule:#E4EDE7;--rule-dark:#C8D9CE;--coral:#F25C38;--coral-soft:#FEF0EC;--sky:#2AA8C4;--sky-soft:#EAF7FB;--lime:#8EC63F;--lime-soft:#F2FAE6;--shadow-xs:0 1px 3px rgba(26,58,42,.08);--shadow-sm:0 2px 8px rgba(26,58,42,.1);--shadow-md:0 6px 24px rgba(26,58,42,.12);--shadow-lg:0 16px 48px rgba(26,58,42,.15);--r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:32px;--font:'Plus Jakarta Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}body{background:var(--cream);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.app-shell{display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--forest);display:flex;align-items:center;padding:0 1.5rem 0 0;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:200}
.topbar-brand{width:260px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 1.5rem;border-right:1px solid rgba(255,255,255,.08);height:56px}
.brand-mark{width:32px;height:32px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;box-shadow:0 2px 10px rgba(245,166,35,.5)}
.brand-name{font-size:1.05rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.brand-name .dr-dink{color:var(--warm-white)}.brand-name .dr-reviews{color:var(--amber)}
.brand-tagline{font-size:.55rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:.2rem}
.topbar-search{flex:1;max-width:480px;margin-left:1.5rem;position:relative}
.topbar-search input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:99px;color:var(--warm-white);font-family:var(--font);font-size:.85rem;padding:.5rem 1rem .5rem 2.5rem;outline:none;transition:background .2s,border-color .2s}
.topbar-search input::placeholder{color:rgba(255,255,255,.35)}.topbar-search input:focus{background:rgba(255,255,255,.14);border-color:var(--amber)}
.topbar-search .si{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:rgba(255,255,255,.4)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.tb-pill{font-size:.75rem;font-weight:700;padding:.42rem 1rem;border-radius:99px;cursor:pointer;font-family:var(--font);border:none;transition:all .15s}
.tb-pill.ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}.tb-pill.ghost:hover{background:rgba(255,255,255,.15);color:var(--warm-white)}
.tb-pill.solid{background:var(--amber);color:var(--forest);box-shadow:0 2px 10px rgba(245,166,35,.4)}.tb-pill.solid:hover{transform:translateY(-1px)}
.tb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--amber));display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:var(--forest);cursor:pointer;border:2px solid rgba(255,255,255,.15)}
.sidebar{background:var(--warm-white);border-right:1px solid var(--rule);padding:1.5rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-brand-strip{padding:.6rem 1.2rem 1.2rem;border-bottom:1px solid var(--rule);margin-bottom:.5rem}
.sbs-label{font-size:.58rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--mist)}
.sbs-name{font-size:.92rem;font-weight:800;letter-spacing:-.03em;color:var(--forest);line-height:1.2;margin-top:.1rem}.sbs-name span{color:var(--amber)}
.sidebar-section{margin-bottom:1.8rem}
.sidebar-label{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);padding:0 1.2rem;margin-bottom:.5rem}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.2rem;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--slate);transition:background .15s,color .15s;border-left:2px solid transparent;text-decoration:none}
.nav-item:hover{background:var(--sage-soft);color:var(--ink)}.nav-item.active{background:var(--sage-soft);color:var(--forest);border-left-color:var(--forest);font-weight:700}
.nav-item .ni{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;font-size:.65rem;font-weight:800;background:var(--amber);color:var(--forest);padding:.12rem .45rem;border-radius:99px}
.nav-item .badge.new{background:var(--coral);color:white}
.filter-group{padding:0 1.2rem}
.filter-group-title{font-size:.7rem;font-weight:700;color:var(--slate);margin-bottom:.6rem}
.filter-check{display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--slate);padding:.3rem 0;cursor:pointer}
.check-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--rule-dark);background:var(--warm-white);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .15s}
.filter-check.checked .check-box{background:var(--forest);border-color:var(--forest);color:white}
.filter-count{margin-left:auto;font-size:.7rem;color:var(--mist)}
.sidebar-bottom{margin-top:auto;padding:1.2rem;border-top:1px solid var(--rule)}
.write-btn-sidebar{width:100%;background:var(--forest);color:var(--warm-white);border:none;border-radius:var(--r-md);padding:.85rem;font-family:var(--font);font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem}
.main{padding:2rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.8rem}
.page-hero{background:var(--forest);border-radius:var(--r-lg);padding:2rem 2.5rem;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;align-items:center;gap:2rem}
.page-hero::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.04;background-image:radial-gradient(circle,#fff 1.5px,transparent 1.5px);background-size:22px 22px}
.page-hero::after{content:'';position:absolute;right:-40px;top:-40px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.2) 0%,transparent 70%);pointer-events:none}
.ph-eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.ph-eyebrow::before{content:'';width:18px;height:1.5px;background:var(--amber);display:block}
.ph-title{font-size:clamp(1.6rem,2.5vw,2.2rem);font-weight:800;letter-spacing:-.03em;color:var(--warm-white);line-height:1.15;margin-bottom:.5rem}
.ph-title em{font-style:normal;color:var(--amber)}
.ph-sub{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.6;max-width:420px}
.ph-stats{display:flex;gap:1.2rem;position:relative;z-index:1}
.ph-stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-md);padding:.9rem 1.2rem;text-align:center;min-width:80px}
.ph-stat-n{font-size:1.6rem;font-weight:800;letter-spacing:-.04em;color:var(--amber);line-height:1}
.ph-stat-l{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.4);margin-top:.2rem;text-transform:uppercase;letter-spacing:.08em}
.filter-bar{background:var(--warm-white);border:1px solid var(--rule);border-radius:var(--r-md);padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:var(--shadow-xs)}
.fb-search{flex:1;min-width:200px;position:relative}
.fb-search input{width:100%;background:var(--cream);border:1.5px solid var(--rule);border-radius:99px;font-family:var(--font);font-size:.88rem;color:var(--ink);padding:.6rem 1rem .6rem 2.4rem;outline:none;transition:border-color .2s}
.fb-search input:focus{border-color:var(--forest)}.fb-search input::placeholder{color:var(--mist)}
.fb-search .fsi{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--mist)}
.fb-divider{width:1px;height:28px;background:var(--rule);flex-shrink:0}
.fb-group{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.fb-label{font-size:.72rem;font-weight:700;color:var(--slate);white-space:nowrap}
.fb-pill{font-size:.75rem;font-weight:600;padding:.38rem .85rem;border-radius:99px;border:1.5px solid var(--rule);background:var(--warm-white);color:var(--slate);cursor:pointer;font-family:var(--font);transition:all .15s}
.fb-pill:hover{border-color:var(--forest);color:var(--forest)}.fb-pill.on
