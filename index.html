<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINKREVIEWS — The Pickleball Community</title>
<meta name="description" content="DINKREVIEWS — Rate courts, paddles, gear and events. The pickleball community's review platform.">
<meta property="og:title" content="DINKREVIEWS — The Pickleball Community">
<meta property="og:description" content="Find it. Play it. Review it. Community-driven ratings for pickleball courts, paddles, gear, and events.">
<meta property="og:url" content="https://hiramlosangeles-crypto.github.io/dinkreviews/">
<meta name="theme-color" content="#1A3A2A">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>

/* ── TOKENS ── */
:root {
  --forest:      #1A3A2A;
  --forest-mid:  #224835;
  --forest-light:#2D5C42;
  --amber:       #F5A623;
  --amber-soft:  #FEF3DC;
  --amber-glow:  rgba(245,166,35,.18);
  --sage:        #7BAE8C;
  --sage-soft:   #EBF4EE;
  --cream:       #FAF8F4;
  --warm-white:  #FFFFFF;
  --ink:         #111A14;
  --ink-mid:     #2C3E30;
  --slate:       #5C7A66;
  --mist:        #A8C0B0;
  --rule:        #E4EDE7;
  --rule-dark:   #C8D9CE;

  --coral:       #F25C38;
  --coral-soft:  #FEF0EC;
  --sky:         #2AA8C4;
  --sky-soft:    #EAF7FB;
  --lime:        #8EC63F;
  --lime-soft:   #F2FAE6;

  --shadow-xs:   0 1px 3px rgba(26,58,42,.08);
  --shadow-sm:   0 2px 8px rgba(26,58,42,.1), 0 1px 3px rgba(26,58,42,.06);
  --shadow-md:   0 6px 24px rgba(26,58,42,.12), 0 2px 8px rgba(26,58,42,.06);
  --shadow-lg:   0 16px 48px rgba(26,58,42,.15), 0 4px 12px rgba(26,58,42,.08);

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 32px;
  --font: 'Plus Jakarta Sans', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; height: 100%; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

.app-shell {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  grid-column: 1 / -1;
  background: var(--forest);
  display: flex; align-items: center;
  padding: 0 1.5rem 0 0;
  border-bottom: 1px solid rgba(255,255,255,.06);
  position: sticky; top: 0; z-index: 200;
}
.topbar-brand {
  width: 260px; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 1.5rem;
  border-right: 1px solid rgba(255,255,255,.08);
  height: 56px;
}
.brand-mark {
  width: 32px; height: 32px; background: var(--amber);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(245,166,35,.5);
}
.brand-name { font-size: 1.05rem; font-weight: 800; color: var(--warm-white); letter-spacing: -.03em; line-height: 1; }
.brand-name .dr-dink { color: var(--warm-white); }
.brand-name .dr-reviews { color: var(--amber); }
.brand-tagline { font-size: .55rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-top: .2rem; line-height: 1; }
.topbar-search { flex: 1; max-width: 480px; margin-left: 1.5rem; position: relative; }
.topbar-search input { width: 100%; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 99px; color: var(--warm-white); font-family: var(--font); font-size: .85rem; padding: .5rem 1rem .5rem 2.5rem; outline: none; transition: background .2s, border-color .2s; }
.topbar-search input::placeholder { color: rgba(255,255,255,.35); }
.topbar-search input:focus { background: rgba(255,255,255,.14); border-color: var(--amber); }
.topbar-search .si { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); font-size: .8rem; color: rgba(255,255,255,.4); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }
.tb-pill { font-size: .75rem; font-weight: 700; padding: .42rem 1rem; border-radius: 99px; cursor: pointer; font-family: var(--font); border: none; transition: all .15s; }
.tb-pill.ghost { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
.tb-pill.ghost:hover { background: rgba(255,255,255,.15); color: var(--warm-white); }
.tb-pill.solid { background: var(--amber); color: var(--forest); box-shadow: 0 2px 10px rgba(245,166,35,.4); }
.tb-pill.solid:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,166,35,.5); }
.tb-av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--sage), var(--amber)); display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; color: var(--forest); cursor: pointer; border: 2px solid rgba(255,255,255,.15); }

/* ── LEFT SIDEBAR ── */
.sidebar { background: var(--warm-white); border-right: 1px solid var(--rule); padding: 1.5rem 0; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; scrollbar-width: none; display: flex; flex-direction: column; }
.sidebar-brand-strip { padding: .6rem 1.2rem 1.2rem; border-bottom: 1px solid var(--rule); margin-bottom: .5rem; }
.sbs-label { font-size: .58rem; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: var(--mist); }
.sbs-name { font-size: .92rem; font-weight: 800; letter-spacing: -.03em; color: var(--forest); line-height: 1.2; margin-top: .1rem; }
.sbs-name span { color: var(--amber); }
.sidebar::-webkit-scrollbar { display: none; }
.sidebar-section { margin-bottom: 1.8rem; }
.sidebar-label { font-size: .62rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--mist); padding: 0 1.2rem; margin-bottom: .5rem; }
.nav-item { display: flex; align-items: center; gap: .75rem; padding: .6rem 1.2rem; cursor: pointer; font-size: .85rem; font-weight: 600; color: var(--slate); transition: background .15s, color .15s; border-left: 2px solid transparent; text-decoration: none; }
.nav-item:hover { background: var(--sage-soft); color: var(--ink); }
.nav-item.active { background: var(--sage-soft); color: var(--forest); border-left-color: var(--forest); font-weight: 700; }
.nav-item .ni { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
.nav-item .badge { margin-left: auto; font-size: .65rem; font-weight: 800; background: var(--amber); color: var(--forest); padding: .12rem .45rem; border-radius: 99px; }
.nav-item .badge.new { background: var(--coral); color: white; }
.filter-group { padding: 0 1.2rem; }
.filter-group-title { font-size: .7rem; font-weight: 700; color: var(--slate); margin-bottom: .6rem; display: flex; align-items: center; justify-content: space-between; }
.filter-group-title button { font-size: .65rem; color: var(--sage); background: none; border: none; cursor: pointer; font-family: var(--font); font-weight: 700; }
.filter-check { display: flex; align-items: center; gap: .6rem; font-size: .8rem; color: var(--slate); padding: .3rem 0; cursor: pointer; transition: color .15s; }
.filter-check:hover { color: var(--ink); }
.check-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--rule-dark); background: var(--warm-white); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .6rem; transition: all .15s; }
.filter-check.checked .check-box { background: var(--forest); border-color: var(--forest); color: white; }
.filter-count { margin-left: auto; font-size: .7rem; color: var(--mist); }
.rating-range { margin-top: .4rem; }
.range-row { display: flex; justify-content: space-between; font-size: .72rem; color: var(--slate); margin-bottom: .4rem; }
.range-track { height: 4px; background: var(--rule); border-radius: 99px; position: relative; margin-bottom: .3rem; }
.range-fill { position: absolute; left: 60%; right: 0; top: 0; bottom: 0; background: var(--amber); border-radius: 99px; }
.sidebar-bottom { margin-top: auto; padding: 1.2rem; border-top: 1px solid var(--rule); }
.write-btn-sidebar { width: 100%; background: var(--forest); color: var(--warm-white); border: none; border-radius: var(--r-md); padding: .85rem; font-family: var(--font); font-size: .85rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; transition: background .2s, box-shadow .2s; box-shadow: var(--shadow-sm); }
.write-btn-sidebar:hover { background: var(--forest-light); box-shadow: var(--shadow-md); }

/* ── MAIN CONTENT ── */
.main { padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 2rem; }

/* ── WELCOME BAR ── */
.welcome-bar { background: var(--forest); border-radius: var(--r-lg); padding: 2rem 2.5rem; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 2rem; overflow: hidden; position: relative; }
.welcome-bar::before { content: ''; position: absolute; right: -40px; top: -40px; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(245,166,35,.18) 0%, transparent 70%); pointer-events: none; }
.welcome-bar::after { content: ''; position: absolute; left: -30px; bottom: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(123,174,140,.1) 0%, transparent 70%); pointer-events: none; }
.welcome-bar .pb-pattern { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: var(--r-lg); opacity: .045; background-image: radial-gradient(circle, #fff 1.5px, transparent 1.5px); background-size: 22px 22px; }
.welcome-text {}
.welcome-eyebrow { font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--amber); margin-bottom: .6rem; display: flex; align-items: center; gap: .6rem; }
.welcome-eyebrow::before { content: ''; width: 20px; height: 1.5px; background: var(--amber); display: block; }
.welcome-h { font-size: clamp(1.6rem, 2.8vw, 2.2rem); font-weight: 800; line-height: 1.15; letter-spacing: -.03em; color: var(--warm-white); margin-bottom: .5rem; }
.welcome-h em { font-style: normal; color: var(--amber); }
.welcome-sub { font-size: .88rem; color: rgba(255,255,255,.55); line-height: 1.6; max-width: 460px; }
.welcome-stats { display: flex; gap: 1.5rem; position: relative; z-index: 1; }
.wstat { text-align: center; background: rgba(255,255,255,.07); border-radius: var(--r-md); padding: 1rem 1.4rem; border: 1px solid rgba(255,255,255,.08); min-width: 90px; }
.wstat-n { font-size: 1.8rem; font-weight: 800; letter-spacing: -.04em; color: var(--amber); line-height: 1; }
.wstat-l { font-size: .65rem; font-weight: 600; color: rgba(255,255,255,.45); margin-top: .3rem; text-transform: uppercase; letter-spacing: .08em; }

/* ── QUICK ACTIONS ── */
.quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.qa-card { background: var(--warm-white); border-radius: var(--r-md); box-shadow: var(--shadow-xs); border: 1px solid var(--rule); padding: 1.3rem; cursor: pointer; transition: transform .2s, box-shadow .2s, border-color .2s; display: flex; flex-direction: column; gap: .7rem; }
.qa-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--rule-dark); }
.qa-icon { width: 42px; height: 42px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.qa-label { font-size: .82rem; font-weight: 700; letter-spacing: -.01em; }
.qa-count { font-size: .72rem; color: var(--slate); font-weight: 500; }
.qa-card.qa-write { background: var(--amber); border-color: transparent; box-shadow: 0 4px 16px rgba(245,166,35,.35); }
.qa-card.qa-write .qa-label { color: var(--forest); font-size: .9rem; }
.qa-card.qa-write .qa-count { color: rgba(26,58,42,.65); }
.qa-card.qa-write .qa-icon { background: rgba(26,58,42,.12); }
.qa-card.qa-write:hover { box-shadow: 0 6px 24px rgba(245,166,35,.5); }

/* ── CONTENT GRID ── */
.content-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; }

/* ── REVIEW LIST ── */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-size: 1rem; font-weight: 800; letter-spacing: -.02em; }
.section-title .dot { color: var(--amber); }
.view-all { font-size: .75rem; font-weight: 700; color: var(--sage); text-decoration: none; transition: color .2s; }
.view-all:hover { color: var(--forest); }
.sort-bar { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
.sort-label { font-size: .75rem; color: var(--slate); font-weight: 600; }
.sort-btn { font-size: .73rem; font-weight: 600; padding: .35rem .8rem; border-radius: 99px; border: 1.5px solid var(--rule); background: var(--warm-white); color: var(--slate); cursor: pointer; font-family: var(--font); transition: all .15s; }
.sort-btn:hover { border-color: var(--forest); color: var(--forest); }
.sort-btn.on { background: var(--forest); color: var(--warm-white); border-color: var(--forest); }

/* ── REVIEW CARDS ── */
.rev-card { background: var(--warm-white); border: 1px solid var(--rule); border-radius: var(--r-md); margin-bottom: .9rem; overflow: hidden; cursor: pointer; transition: box-shadow .2s, border-color .2s; display: grid; grid-template-columns: 120px 1fr; }
.rev-card:hover { box-shadow: var(--shadow-md); border-color: var(--rule-dark); }
.rev-card-thumb { display: flex; align-items: center; justify-content: center; font-size: 2.2rem; background: var(--sage-soft); border-right: 1px solid var(--rule); min-height: 130px; }
.rev-card-body { padding: 1.1rem 1.2rem; display: flex; flex-direction: column; gap: .4rem; }
.rev-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
.rev-cat { font-size: .62rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; padding: .2rem .6rem; border-radius: 99px; }
.cat-c { background: var(--sage-soft); color: var(--forest); }
.cat-p { background: var(--lime-soft); color: #4A7000; }
.cat-g { background: var(--coral-soft); color: var(--coral); }
.cat-e { background: var(--amber-soft); color: #8A5A00; }
.cat-t { background: var(--sky-soft); color: var(--sky); }
.rev-score { display: flex; align-items: center; gap: .35rem; flex-shrink: 0; }
.score-num { font-size: 1.3rem; font-weight: 800; letter-spacing: -.04em; line-height: 1; }
.score-bar-wrap { display: flex; flex-direction: column; gap: 2px; }
.score-bar-track { width: 52px; height: 4px; background: var(--rule); border-radius: 2px; }
.score-bar-fill { height: 100%; background: var(--amber); border-radius: 2px; transition: width .4s ease; }
.score-count { font-size: .65rem; color: var(--mist); font-weight: 600; }
.rev-title { font-size: .98rem; font-weight: 700; letter-spacing: -.02em; line-height: 1.3; }
.rev-loc { font-size: .75rem; color: var(--slate); display: flex; align-items: center; gap: .3rem; }
.rev-excerpt { font-size: .82rem; color: var(--slate); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rev-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .3rem; }
.rev-author { display: flex; align-items: center; gap: .5rem; }
.rev-av { width: 22px; height: 22px; border-radius: 50%; font-size: .6rem; font-weight: 800; color: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.rev-name { font-size: .75rem; font-weight: 700; }
.rev-date { font-size: .68rem; color: var(--mist); }
.rev-actions { display: flex; gap: .4rem; }
.rev-btn { font-size: .68rem; font-weight: 700; padding: .25rem .6rem; border-radius: 99px; border: 1px solid var(--rule); background: none; color: var(--slate); cursor: pointer; font-family: var(--font); transition: all .15s; }
.rev-btn:hover { border-color: var(--sage); color: var(--forest); background: var(--sage-soft); }

/* ── RIGHT PANEL ── */
.right-panel { display: flex; flex-direction: column; gap: 1.2rem; }
.score-widget { background: var(--warm-white); border: 1px solid var(--rule); border-radius: var(--r-lg); padding: 1.5rem; box-shadow: var(--shadow-xs); }
.widget-title { font-size: .65rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--mist); margin-bottom: 1.2rem; }
.big-score { display: flex; align-items: flex-end; gap: .8rem; margin-bottom: 1.2rem; }
.big-score-num { font-size: 4rem; font-weight: 800; letter-spacing: -.06em; line-height: 1; color: var(--forest); }
.big-score-meta { padding-bottom: .5rem; }
.big-score-stars { font-size: 1rem; color: var(--amber); letter-spacing: 1px; }
.big-score-count { font-size: .72rem; color: var(--mist); font-weight: 600; margin-top: .2rem; }
.score-bars { display: flex; flex-direction: column; gap: .55rem; }
.sbar-row { display: flex; align-items: center; gap: .7rem; }
.sbar-label { font-size: .72rem; font-weight: 700; color: var(--slate); width: 14px; text-align: right; flex-shrink: 0; }
.sbar-star { font-size: .7rem; color: var(--amber); }
.sbar-track { flex: 1; height: 6px; background: var(--rule); border-radius: 99px; overflow: hidden; }
.sbar-fill { height: 100%; background: var(--amber); border-radius: 99px; }
.sbar-pct { font-size: .68rem; color: var(--mist); font-weight: 600; width: 28px; text-align: right; flex-shrink: 0; }
.map-widget { background: var(--warm-white); border: 1px solid var(--rule); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-xs); }
.map-placeholder { height: 160px; background: linear-gradient(135deg, #1A3A2A 0%, #2D5C42 40%, #1E4A34 70%, #163320 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.map-placeholder::before { content: ''; position: absolute; inset: 0; opacity: .1; background-image: linear-gradient(rgba(123,174,140,1) 1px, transparent 1px), linear-gradient(90deg, rgba(123,174,140,1) 1px, transparent 1px); background-size: 28px 28px; }
.map-pin { position: absolute; width: 28px; height: 28px; border-radius: 50%; background: var(--amber); border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; font-size: .7rem; cursor: pointer; transition: transform .2s; }
.map-pin:hover { transform: scale(1.2); }
.map-pin-label { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); background: var(--forest); color: white; font-size: .6rem; font-weight: 700; padding: .15rem .45rem; border-radius: 4px; white-space: nowrap; opacity: 0; transition: opacity .2s; }
.map-pin:hover .map-pin-label { opacity: 1; }
.map-widget-body { padding: 1rem 1.2rem; }
.map-widget-title { font-size: .65rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--mist); margin-bottom: .8rem; }
.nearby-row { display: flex; align-items: center; gap: .8rem; padding: .55rem 0; border-bottom: 1px solid var(--rule); cursor: pointer; transition: background .15s; margin: 0 -.3rem; padding-left: .3rem; padding-right: .3rem; border-radius: 8px; }
.nearby-row:last-child { border-bottom: none; }
.nearby-row:hover { background: var(--sage-soft); }
.nr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.nr-name { font-size: .82rem; font-weight: 700; flex: 1; }
.nr-dist { font-size: .7rem; color: var(--mist); font-weight: 600; }
.nr-score { font-size: .78rem; font-weight: 800; color: var(--forest); }
.quick-write { background: var(--forest); border-radius: var(--r-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); }
.qw-title { font-size: .72rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: .8rem; }
.qw-q { font-size: 1.05rem; font-weight: 700; color: var(--warm-white); line-height: 1.35; margin-bottom: 1rem; letter-spacing: -.02em; }
.qw-stars { display: flex; gap: .4rem; margin-bottom: 1rem; }
.qw-star { font-size: 1.6rem; cursor: pointer; color: rgba(255,255,255,.2); transition: color .1s; }
.qw-star.lit { color: var(--amber); }
.qw-input { width: 100%; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: var(--r-sm); color: var(--warm-white); font-family: var(--font); font-size: .85rem; padding: .7rem .9rem; outline: none; resize: none; transition: border-color .2s; min-height: 72px; }
.qw-input::placeholder { color: rgba(255,255,255,.3); }
.qw-input:focus { border-color: var(--amber); }
.qw-submit { width: 100%; background: var(--amber); color: var(--forest); border: none; border-radius: var(--r-sm); padding: .8rem; font-family: var(--font); font-weight: 800; font-size: .88rem; cursor: pointer; margin-top: .8rem; transition: box-shadow .2s, transform .15s; }
.qw-submit:hover { box-shadow: 0 4px 16px rgba(245,166,35,.5); transform: translateY(-1px); }

/* ── TRENDING STRIP ── */
.trending-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.trend-card { background: var(--warm-white); border: 1px solid var(--rule); border-radius: var(--r-md); padding: 1.2rem; cursor: pointer; transition: transform .2s, box-shadow .2s; position: relative; overflow: hidden; }
.trend-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--amber); }
.trend-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
